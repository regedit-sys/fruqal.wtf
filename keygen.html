<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RADIUM Key Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff88;
    --green-dim: #00cc66;
    --green-glow: rgba(0,255,136,0.3);
    --bg: #030a05;
    --panel: #070f09;
    --border: #0d2e14;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    width: min(600px, 92vw);
    position: relative;
    z-index: 10;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 900;
    letter-spacing: 0.15em;
    text-shadow: 0 0 20px var(--green), 0 0 40px var(--green-glow);
    animation: flicker 8s infinite;
  }

  .logo span { color: #fff; }

  .subtitle {
    font-size: 0.72rem;
    letter-spacing: 0.3em;
    color: var(--green-dim);
    margin-top: 0.4rem;
    opacity: 0.7;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
    box-shadow: 0 0 40px rgba(0,255,136,0.05), inset 0 0 60px rgba(0,0,0,0.5);
    position: relative;
  }

  .panel::before {
    content: '// RADIUM KEY DISTRIBUTION SYSTEM v2.4.1';
    position: absolute;
    top: -1px;
    left: 12px;
    font-size: 0.65rem;
    background: var(--panel);
    padding: 0 6px;
    color: var(--green-dim);
    opacity: 0.6;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.7rem;
    color: var(--green-dim);
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--green-dim);
    margin-bottom: 0.5rem;
  }

  .count-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .count-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--green-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 0.4rem 1rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .count-btn:hover, .count-btn.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,255,136,0.05);
    box-shadow: 0 0 10px rgba(0,255,136,0.1);
  }

  .generate-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    padding: 0.9rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .generate-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,136,0.1), transparent);
    transition: left 0.4s;
  }

  .generate-btn:hover { box-shadow: 0 0 20px rgba(0,255,136,0.2); }
  .generate-btn:hover::before { left: 100%; }
  .generate-btn:active { background: rgba(0,255,136,0.08); }

  .generate-btn.loading { opacity: 0.7; pointer-events: none; }

  .keys-output {
    min-height: 80px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1rem;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    line-height: 2;
    color: var(--green);
    display: none;
    position: relative;
  }

  .keys-output.visible { display: block; }

  .key-line {
    opacity: 0;
    transform: translateX(-8px);
    transition: opacity 0.3s, transform 0.3s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .key-line.shown { opacity: 1; transform: translateX(0); }

  .copy-key {
    background: none;
    border: none;
    color: var(--green-dim);
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    opacity: 0;
    transition: opacity 0.2s;
    padding: 2px 6px;
    letter-spacing: 0.1em;
  }

  .key-line:hover .copy-key { opacity: 1; }
  .copy-key:hover { color: var(--green); }

  .copy-all-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 0.75rem;
  }

  .copy-all-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--green-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 0.3rem 0.75rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .copy-all-btn:hover {
    border-color: var(--green-dim);
    color: var(--green);
  }

  .footer-note {
    text-align: center;
    font-size: 0.62rem;
    color: var(--green-dim);
    opacity: 0.35;
    margin-top: 1.5rem;
    letter-spacing: 0.15em;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.6; }
    97% { opacity: 1; }
    98% { opacity: 0.7; }
    99% { opacity: 1; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">RADIUM<span> </span>KEYGEN</div>
    <div class="subtitle">AUTHORIZED REFERRAL KEY DISTRIBUTION TERMINAL</div>
  </header>

  <div class="panel">
    <div class="status-bar">
      <div class="dot"></div>
      <span>SERVER CONNECTED &nbsp;|&nbsp; AUTH LEVEL: STAFF &nbsp;|&nbsp; POOL: UNLIMITED</span>
    </div>

    <label>QUANTITY</label>
    <div class="count-row" id="countRow">
      <button class="count-btn active" data-val="1">×1</button>
      <button class="count-btn" data-val="5">×5</button>
      <button class="count-btn" data-val="10">×10</button>
      <button class="count-btn" data-val="25">×25</button>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generate()">
      ⟳ &nbsp; GENERATE KEYS
    </button>

    <div class="keys-output" id="output"></div>
    <div class="copy-all-row" id="copyAllRow" style="display:none">
      <button class="copy-all-btn" onclick="copyAll()">[ COPY ALL ]</button>
    </div>
  </div>

  <div class="footer-note">RADIUM INTERNAL DISTRIBUTION SYSTEM — AUTHORIZED USE ONLY</div>
</div>

<script>
  let selectedCount = 1;
  let currentKeys = [];

  document.querySelectorAll('.count-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedCount = parseInt(btn.dataset.val);
    });
  });

  function randomSegment() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let seg = '';
    for (let i = 0; i < 4; i++) seg += chars[Math.floor(Math.random() * chars.length)];
    return seg;
  }

  function generateKey() {
    return `RADIUM-${randomSegment()}-${randomSegment()}-${randomSegment()}-${randomSegment()}`;
  }

  async function generate() {
    const btn = document.getElementById('generateBtn');
    const output = document.getElementById('output');
    const copyAllRow = document.getElementById('copyAllRow');

    btn.classList.add('loading');
    btn.textContent = '⟳   CONTACTING SERVER...';
    output.innerHTML = '';
    output.classList.remove('visible');
    copyAllRow.style.display = 'none';
    currentKeys = [];

    // Fake loading delay
    await new Promise(r => setTimeout(r, 600 + Math.random() * 600));

    btn.textContent = '⟳   GENERATING...';
    await new Promise(r => setTimeout(r, 400));

    currentKeys = Array.from({ length: selectedCount }, generateKey);

    output.classList.add('visible');
    for (let i = 0; i < currentKeys.length; i++) {
      const key = currentKeys[i];
      const line = document.createElement('div');
      line.className = 'key-line';
      line.innerHTML = `<span>${key}</span><button class="copy-key" onclick="copyKey('${key}', this)">COPY</button>`;
      output.appendChild(line);
      await new Promise(r => setTimeout(r, 60));
      line.classList.add('shown');
    }

    copyAllRow.style.display = 'flex';
    btn.classList.remove('loading');
    btn.textContent = '⟳   GENERATE KEYS';
  }

  function copyKey(key, btn) {
    navigator.clipboard.writeText(key);
    const orig = btn.textContent;
    btn.textContent = 'COPIED';
    setTimeout(() => btn.textContent = orig, 1200);
  }

  function copyAll() {
    navigator.clipboard.writeText(currentKeys.join('\n'));
    const btn = document.querySelector('.copy-all-btn');
    btn.textContent = '[ COPIED! ]';
    setTimeout(() => btn.textContent = '[ COPY ALL ]', 1500);
  }
</script>
</body>
</html>
